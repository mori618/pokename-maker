<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン ニックネームメーカー</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Google AdSense Code -->
    <!-- 審査に申し込む際、ここに発行されたコードを貼り付けてください -->
</head>

<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <h1>ニックネームメーカー</h1>
            </div>
            <nav class="header-nav">

                <button id="help-btn" class="icon-btn">
                    <span class="material-icons-round">help_outline</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="app-main">
        <section class="controls-section glass-panel">
            <h2>条件を指定する</h2>

            <div class="form-group">
                <label for="pokemon-input">
                    <span class="material-icons-round">search</span>
                    対象のポケモン (任意)
                </label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="pokemon-input" placeholder="例: ピカチュウ" autocomplete="off">
                    <ul id="suggestions-list" class="suggestions hidden"></ul>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="material-icons-round">category</span>
                    タイプ (任意)
                </label>
                <div class="type-grid" id="type-grid">
                    <!-- Types will be injected here -->
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="material-icons-round">palette</span>
                    雰囲気 / テーマ (複数選択可)
                </label>
                <div class="theme-tags" id="theme-tags">
                    <button class="theme-btn active" data-theme="random">おまかせ</button>
                    <button class="theme-btn" data-theme="cool">かっこいい</button>
                    <button class="theme-btn" data-theme="cute">かわいい</button>
                    <button class="theme-btn" data-theme="japanese">和風</button>
                    <button class="theme-btn" data-theme="western">洋風</button>
                    <button class="theme-btn" data-theme="unique">ネタ</button>
                    <button class="theme-btn" data-theme="gibberish">ランダム</button>
                </div>
            </div>

            <div class="form-group">
                <label for="length-slider">
                    <span class="material-icons-round">straighten</span>
                    文字数目安 (1〜6文字)
                </label>
                <div class="slider-container">
                    <input type="range" id="length-slider" min="1" max="6" value="5" class="slider">
                    <span id="length-val" class="slider-val">5文字</span>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn primary-btn pulse-anim">
                <span class="material-icons-round">auto_awesome</span>
                ニックネームを生成！
            </button>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h2>生成結果</h2>
                <div class="results-actions">
                    <button id="regenerate-btn" class="icon-btn tooltip" data-tooltip="再生成">
                        <span class="material-icons-round">refresh</span>
                    </button>
                </div>
            </div>
            <div id="results-grid" class="results-grid">
                <div class="empty-state">
                    <span class="material-icons-round huge-icon">cruelty_free</span>
                    <p>条件を指定して「生成」ボタンを押してください</p>
                </div>
            </div>
        </section>
    </main>



    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 ポケモン ニックネームメーカー</p>
            <nav class="footer-nav">
                <a href="privacy.html">プライバシーポリシー</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>

</html>
