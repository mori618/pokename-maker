<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン ニックネームメーカー チャンピオンズ用 | for champions</title>
    <meta name="description"
        content="チャンピオンズ用ポケモン ニックネームメーカー。あなたのポケモンにぴったりの名前を自動生成するツールです。かっこいい、かわいい、和風、外国語風など、様々なテーマから最高のニックネームを見つけましょう。">
    <meta name="keywords" content="ポケモン,チャンピオンズ,ニックネーム,名前,メーカー,ジェネレーター,かっこいい,かわいい,自動生成,ポケモン名">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yurand.com/nickname/"> <!-- 必要に応じて修正してください -->
    <meta property="og:title" content="ポケモン ニックネームメーカー チャンピオンズ用">
    <meta property="og:description" content="チャンピオンズ用の最高なニックネームをあなたのポケモンに。テーマに合わせて自動生成！">
    <meta property="og:image" content="https://yurand.com/nickname/og-image.png"> <!-- 画像がある場合は配置してください -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yurand.com/nickname/">
    <meta property="twitter:title" content="ポケモン ニックネームメーカー チャンピオンズ用">
    <meta property="twitter:description" content="チャンピオンズ用の最高なニックネームをあなたのポケモンに。テーマに合わせて自動生成！">
    <meta property="twitter:image" content="https://yurand.com/nickname/og-image.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yurand.com/nickname/">
    <link rel="icon" href="favicon.png" type="image/png">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ポケモン ニックネームメーカー チャンピオンズ用",
      "url": "https://yurand.com/nickname/",
      "description": "チャンピオンズ用のポケモンにぴったりのニックネームを自動生成するツール。かっこいい、かわいい、和風などのテーマが選択可能。",
      "applicationCategory": "Utility",
      "operatingSystem": "All"
    }
    </script>

    <!-- Google AdSense Code -->
    <!-- 審査に申し込む際、ここに発行されたコードを貼り付けてください -->
</head>

<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <h1>
                    <span>ニックネームメーカー</span>
                    <span class="logo-sub">チャンピオンズ用 / for champions</span>
                </h1>
            </div>
            <nav class="header-nav">
            </nav>
        </div>
    </header>

    <main class="app-main">
        <section class="controls-section glass-panel">
            <h2>条件を指定する</h2>

            <div class="form-group">
                <label for="pokemon-input">
                    <span class="material-icons-round">search</span>
                    対象のポケモン (任意)
                </label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="pokemon-input" placeholder="例: ピカチュウ" autocomplete="off">
                    <ul id="suggestions-list" class="suggestions hidden"></ul>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="material-icons-round">category</span>
                    タイプ (任意)
                </label>
                <div class="type-grid" id="type-grid">
                    <!-- Types will be injected here -->
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="material-icons-round">palette</span>
                    雰囲気 / テーマ (複数選択可)
                </label>
                <div class="theme-tags" id="theme-tags">
                    <button class="theme-btn active" data-theme="random">おまかせ</button>
                    <button class="theme-btn" data-theme="cool">かっこいい</button>
                    <button class="theme-btn" data-theme="cute">かわいい</button>
                    <button class="theme-btn" data-theme="japanese">和風</button>
                    <button class="theme-btn" data-theme="western">洋風</button>
                    <button class="theme-btn" data-theme="unique">ネタ</button>
                    <button class="theme-btn" data-theme="gibberish">ランダム</button>
                </div>
            </div>

            <div class="form-group">
                <label for="length-slider">
                    <span class="material-icons-round">straighten</span>
                    文字数目安 (1〜6文字)
                </label>
                <div class="slider-container">
                    <input type="range" id="length-slider" min="1" max="6" value="6" class="slider">
                    <span id="length-val" class="slider-val">6文字</span>
                </div>
            </div>

            <div class="form-group mode-toggle-group">
                <label class="toggle-label" for="association-toggle">
                    <input type="checkbox" id="association-toggle" class="toggle-checkbox">
                    <div class="toggle-switch"></div>
                    <span class="toggle-text">インスピレーションモード (自分で考えるヒントを表示)</span>
                </label>
            </div>

            <button id="generate-btn" class="generate-btn primary-btn pulse-anim">
                ニックネームを作成！
            </button>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h2>生成結果</h2>
                <div class="results-actions">
                    <button id="regenerate-btn" class="icon-btn tooltip" data-tooltip="再生成">
                        <span class="material-icons-round">refresh</span>
                    </button>
                </div>
            </div>
            <div id="results-grid" class="results-grid">
                <div class="empty-state">
                    <span class="material-icons-round huge-icon">cruelty_free</span>
                    <p>条件を指定して「生成」ボタンを押してください</p>
                </div>
            </div>
        </section>
    </main>



    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 ポケモン ニックネームメーカー</p>
            <nav class="footer-nav">
                <a href="privacy.html">プライバシーポリシー</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>

</html>
